---
layout: default
---
{% assign cat_posts = site.posts | where_exp: "post", "post.categories contains page.category" %}
<section class="category-page">
  <header class="category-header">
    <a href="{{ '/categories/' | relative_url }}" class="category-back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Categories
    </a>
    <div class="category-title-row">
      <svg class="folder-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
      </svg>
      <h1 class="category-page-title">{{ page.title }}</h1>
      <span class="category-page-count">{{ cat_posts.size }}</span>
    </div>
  </header>

  <ul class="folder-post-list">
    {% for post in cat_posts %}
    <li class="folder-post-item">
      <span class="folder-post-bullet">&bull;</span>
      <a href="{{ post.url | relative_url }}" class="folder-post-link">{{ post.title }}</a>
      <span class="folder-post-dots"></span>
      <time class="folder-post-date" datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%b %-d, %Y" }}</time>
    </li>
    {% endfor %}
  </ul>
</section>
