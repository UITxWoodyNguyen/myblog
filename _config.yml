# ============================================================
# Site Settings
# ============================================================
title: wood13nqxy3n's Blog
description: "A personal blog about coding, technology, and life."
author: Woodie
url: "https://woodie.github.io" # e.g. https://woodie.github.io
baseurl: "" # Leave empty for user/org pages

# ============================================================
# Build Settings
# ============================================================
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# ============================================================
# Plugins
# ============================================================
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# ============================================================
# Pagination (manual, no plugin needed)
# ============================================================
paginate: 10

# ============================================================
# Collections & Defaults
# ============================================================
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# ============================================================
# Social / Links
# ============================================================
github_username: UITxWoodyNguyen

# ============================================================
# Exclude from build
# ============================================================
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - LICENSE
