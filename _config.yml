# ============================================================
# Site Settings
# ============================================================
title: Wood13nqxy3n's Blog
description: "This is Wood13nqxy3n's personal blog."
author: Woodie
url: "https://uitxwoodynguyen.github.io"
baseurl: "/myblog"

# ============================================================
# Build Settings
# ============================================================
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# ============================================================
# Plugins
# ============================================================
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate

# ============================================================
# Pagination
# ============================================================
paginate: 10
paginate_path: "/page/:num/"

# ============================================================
# Collections & Defaults
# ============================================================
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# ============================================================
# Social / Links
# ============================================================
github_username: UITxWoodyNguyen

# ============================================================
# Exclude from build
# ============================================================
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - LICENSE
